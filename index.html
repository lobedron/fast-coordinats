<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fast Coordinats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-normal">
<div class="app">
    <div class="exchange">
        <div class="panel theme-overworld" id="panelLeft">
            <div class="dimension-header">
                <div class="dimension-name" id="leftDimName">OVERWORLD</div>
                <div class="panel-actions">
                    <button class="icon-btn" onclick="triggerPaste(true)" title="Умная вставка">
                        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    </button>
                    <button class="icon-btn" onclick="copyCoords(true)" title="Скопировать всё">
                        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
            <div class="coord-line">
                <div class="coord"><label>X</label><input type="text" id="leftX" value="0" inputmode="numeric"></div>
                <div class="coord"><label>Y</label><input type="text" id="leftY" value="0" inputmode="numeric"></div>
                <div class="coord"><label>Z</label><input type="text" id="leftZ" value="0" inputmode="numeric"></div>
            </div>
        </div>

        <div class="swap-button">
            <button class="swap-btn" id="swapBtn" title="Поменять миры местами">
                <svg viewBox="0 0 24 24"><path d="M17 3l4 4-4 4M3 17l4 4 4-4M21 7H3M13 17H3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
        </div>

        <div class="panel theme-nether" id="panelRight">
            <div class="dimension-header">
                <div class="dimension-name" id="rightDimName">NETHER</div>
                <div class="panel-actions">
                    <button class="icon-btn" onclick="triggerPaste(false)" title="Умная вставка">
                        <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    </button>
                    <button class="icon-btn" onclick="copyCoords(false)" title="Скопировать всё">
                        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
            <div class="coord-line">
                <div class="coord"><label>X</label><input type="text" id="rightX" value="0" inputmode="numeric"></div>
                <div class="coord"><label>Y</label><input type="text" id="rightY" value="0" inputmode="numeric"></div>
                <div class="coord"><label>Z</label><input type="text" id="rightZ" value="0" inputmode="numeric"></div>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast">✓ Готово</div>
<div class="version-tag">v1.3</div>

<script src="script.js"></script>
</body>
</html>
